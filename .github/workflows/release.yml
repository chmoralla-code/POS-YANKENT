name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing immutable release tag to rebuild, such as vX.Y.Z"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-windows-stable
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Test and build
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout immutable tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag and package versions
        id: meta
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $tag = $env:RELEASE_TAG.Trim()
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tag must use vX.Y.Z format; received '$tag'."
          }
          $version = $Matches.version
          $packageVersion = (node -p "require('./package.json').version").Trim()
          $lockVersion = (node -p "require('./package-lock.json').packages[''].version").Trim()
          if ($packageVersion -ne $version -or $lockVersion -ne $version) {
            throw "Tag $tag, package.json ($packageVersion), and package-lock.json ($lockVersion) must match."
          }

          $tagType = (git cat-file -t $tag).Trim()
          if ($tagType -ne 'tag') { throw "$tag must be an annotated tag containing release notes." }
          $head = (git rev-parse HEAD).Trim()
          $tagCommit = (git rev-list -n 1 $tag).Trim()
          if ($head -ne $tagCommit) { throw "Checked-out commit does not match $tag." }

          $notes = (git for-each-ref --format='%(contents)' "refs/tags/$tag") -join "`n"
          if ([string]::IsNullOrWhiteSpace($notes)) { throw "$tag has no release notes." }
          Set-Content release-notes.md $notes -Encoding utf8
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Reject tracked runtime or customer data
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $trackedData = @(git ls-files -- 'data/')
          if ($LASTEXITCODE -ne 0) { throw "Could not inspect tracked data files." }
          $sensitiveData = @($trackedData | Where-Object { $_ -match '(?i)\.(sqlite|yankent)$' })
          if ($sensitiveData.Count -gt 0) {
            throw "Refusing to publish tracked runtime/customer data: $($sensitiveData -join ', ')"
          }

      - name: Reject embedded Telegram bot credentials
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $false

          $telegramTokenPattern = '[0-9]{6,12}:[A-Za-z0-9_-]{30,50}'
          $savedPreference = $ErrorActionPreference
          $secretFiles = @()
          $grepExit = -1
          try {
            $ErrorActionPreference = "Continue"
            $secretFiles = @(git grep -a -l -E $telegramTokenPattern -- .)
            $grepExit = $LASTEXITCODE
          } finally {
            $ErrorActionPreference = $savedPreference
          }

          if ($grepExit -gt 1) {
            throw "Could not scan tracked files for Telegram bot tokens (git grep exit $grepExit)."
          }
          $releaseNotes = Get-Content -Raw -LiteralPath release-notes.md
          if ($releaseNotes -match $telegramTokenPattern) {
            throw "Refusing to publish a Telegram bot password embedded in the release notes."
          }
          if ($secretFiles.Count -gt 0) {
            throw "Refusing to publish a Telegram bot password embedded in: $($secretFiles -join ', ')"
          }

      - name: Reject a version regression or duplicate
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $version = [System.Management.Automation.SemanticVersion]"${{ steps.meta.outputs.version }}"
          $releases = gh release list --repo $env:GITHUB_REPOSITORY --limit 100 --json tagName,isDraft,isPrerelease
          if ($LASTEXITCODE -ne 0) { throw "Could not inspect existing GitHub releases." }

          $shipped = $releases | ConvertFrom-Json |
            Where-Object { -not $_.isDraft -and -not $_.isPrerelease -and $_.tagName -match '^v\d+\.\d+\.\d+$' } |
            ForEach-Object { [System.Management.Automation.SemanticVersion]$_.tagName.Substring(1) }
          if ($shipped) {
            $highest = $shipped | Sort-Object -Descending | Select-Object -First 1
            if ($version -le $highest) {
              throw "Version $version must be higher than historical release $highest."
            }
          }

          $head = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0) { throw "Could not identify the release commit." }
          $commits = @(git rev-list --all)
          if ($LASTEXITCODE -ne 0) { throw "Could not inspect Git history." }

          $historicalPackageVersions = @(
            foreach ($commit in $commits) {
              if ($commit -eq $head) { continue }

              git cat-file -e ($commit + ':package.json') 2>$null
              if ($LASTEXITCODE -ne 0) { continue }

              $historicalJson = @(git show ($commit + ':package.json'))
              if ($LASTEXITCODE -ne 0) { throw "Could not read package.json at commit $commit." }

              try {
                $historicalPackage = ($historicalJson -join [Environment]::NewLine) | ConvertFrom-Json
                $historicalVersionText = [string]$historicalPackage.version
                if ([string]::IsNullOrWhiteSpace($historicalVersionText)) {
                  throw "package.json has no version."
                }
                [System.Management.Automation.SemanticVersion]$historicalVersionText
              } catch {
                throw "Could not parse package.json version at commit $($commit): $($_.Exception.Message)"
              }
            }
          )
          if ($historicalPackageVersions.Count -gt 0) {
            $highestHistoricalPackage = $historicalPackageVersions | Sort-Object -Descending | Select-Object -First 1
            if ($version -le $highestHistoricalPackage) {
              throw "Version $version must be higher than package version $highestHistoricalPackage already present in Git history."
            }
          }

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Full IPC smoke test
        run: npm run smoke

      - name: Build NSIS installer
        run: npm run dist -- --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify updater package
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.meta.outputs.version }}"
          $exe = "dist/YANKENT-POS-Setup-$version.exe"
          $blockmap = "$exe.blockmap"
          $metadata = "dist/latest.yml"
          $appUpdate = "dist/win-unpacked/resources/app-update.yml"
          $unpackedExe = "dist/win-unpacked/YANKENT POS.exe"
          foreach ($file in @($exe, $blockmap, $metadata, $appUpdate, $unpackedExe)) {
            if (-not (Test-Path -LiteralPath $file)) { throw "Missing required updater file: $file" }
          }

          $packagedSensitiveData = @(
            Get-ChildItem 'dist/win-unpacked' -Recurse -File |
              Where-Object { $_.Name -like '*.sqlite*' -or $_.Name -like '*.yankent' }
          )
          if ($packagedSensitiveData.Count -gt 0) {
            throw "Refusing to publish packaged POS data: $($packagedSensitiveData.FullName -join ', ')"
          }

          $metadataText = Get-Content -Raw -LiteralPath $metadata
          $versionPattern = "(?m)^version:\s*$([regex]::Escape($version))\s*$"
          if ($metadataText -notmatch $versionPattern) {
            throw "latest.yml does not contain version $version."
          }
          $exeName = Split-Path -Leaf $exe
          if ($metadataText -notmatch [regex]::Escape($exeName)) {
            throw "latest.yml does not reference $exeName."
          }

          $exeInfo = Get-Item -LiteralPath $exe
          $sha512Hex = (Get-FileHash -Algorithm SHA512 -LiteralPath $exe).Hash
          $sha512ByteList = for ($i = 0; $i -lt $sha512Hex.Length; $i += 2) {
            [Convert]::ToByte($sha512Hex.Substring($i, 2), 16)
          }
          $sha512Bytes = [byte[]]$sha512ByteList
          $sha512Base64 = [Convert]::ToBase64String($sha512Bytes)
          $hashPattern = "(?m)^sha512:\s*$([regex]::Escape($sha512Base64))\s*$"
          if ($metadataText -notmatch $hashPattern) {
            throw "latest.yml SHA-512 does not match the installer."
          }
          $sizePattern = "(?m)^[ \t]+size:\s*$($exeInfo.Length)\s*$"
          if ($metadataText -notmatch $sizePattern) {
            throw "latest.yml size does not match the installer."
          }

          $config = Get-Content -Raw -LiteralPath $appUpdate
          foreach ($pattern in @('provider:\s*github', 'owner:\s*chmoralla-code', 'repo:\s*POS-YANKENT')) {
            if ($config -notmatch $pattern) { throw "app-update.yml failed check: $pattern" }
          }
          if ((Get-Item -LiteralPath $exe).Length -lt 1MB) { throw "Installer is unexpectedly small." }

          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) {
            "::warning::Windows signing secrets are not configured; the installer will show Unknown publisher."
            "### Code signing`n- WARNING: Installer is unsigned. Configure WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD." >> $env:GITHUB_STEP_SUMMARY
          } else {
            $publisherMatch = [regex]::Match($config, '(?m)^publisherName:[ \t]*(?<inline>[^\r\n]*)\r?$')
            if (-not $publisherMatch.Success) {
              throw "Signed packages must include publisherName in app-update.yml."
            }

            $inlinePublisher = $publisherMatch.Groups['inline'].Value.Trim()
            $emptyPublisherValues = @('', '[]', 'null', '~', '""', "''")
            $hasPublisher = $emptyPublisherValues -notcontains $inlinePublisher
            if (-not $hasPublisher -and [string]::IsNullOrWhiteSpace($inlinePublisher)) {
              $followingConfig = $config.Substring($publisherMatch.Index + $publisherMatch.Length)
              $listMatch = [regex]::Match($followingConfig, '^\r?\n[ \t]+-[ \t]+(?<publisher>[^\r\n]+)')
              if ($listMatch.Success) {
                $listedPublisher = $listMatch.Groups['publisher'].Value.Trim()
                $hasPublisher = $emptyPublisherValues -notcontains $listedPublisher
              }
            }
            if (-not $hasPublisher) {
              throw "Signed packages must include a nonempty publisherName in app-update.yml."
            }

            foreach ($signedFile in @($exe, $unpackedExe)) {
              $signature = Get-AuthenticodeSignature -LiteralPath $signedFile
              if ($signature.Status -ne 'Valid') {
                throw "Signature verification failed for $signedFile`: $($signature.Status)"
              }
            }
            "### Code signing`n- Authenticode signatures verified for the installer and unpacked application.`n- Packaged publisherName verified." >> $env:GITHUB_STEP_SUMMARY
          }

          $files = @($exe, $blockmap, $metadata)
          $sums = $files | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_
            "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $_)"
          }
          Set-Content 'dist/SHA256SUMS.txt' $sums -Encoding utf8

      - name: Preserve verified artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-release-${{ steps.meta.outputs.version }}
          path: |
            dist/YANKENT-POS-Setup-${{ steps.meta.outputs.version }}.exe
            dist/YANKENT-POS-Setup-${{ steps.meta.outputs.version }}.exe.blockmap
            dist/latest.yml
            dist/SHA256SUMS.txt
            release-notes.md
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  draft:
    name: Create and verify draft
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-release-${{ needs.build.outputs.version }}
          path: release

      - name: Create or resume draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          $repo = $env:GITHUB_REPOSITORY
          $files = @(
            "release/dist/YANKENT-POS-Setup-$env:VERSION.exe",
            "release/dist/YANKENT-POS-Setup-$env:VERSION.exe.blockmap",
            "release/dist/latest.yml",
            "release/dist/SHA256SUMS.txt"
          )

          $existingJson = gh release view $tag --repo $repo --json isDraft,isPrerelease 2>$null
          if ($LASTEXITCODE -eq 0) {
            $existing = $existingJson | ConvertFrom-Json
            if ($existing.isPrerelease) { throw "Prerelease draft $tag cannot be resumed as a stable release." }
            if (-not $existing.isDraft) { throw "Published release $tag already exists and is immutable." }
            gh release edit $tag --repo $repo --title "YANKENT POS $env:VERSION" --notes-file 'release/release-notes.md'
            if ($LASTEXITCODE -ne 0) { throw "Could not refresh draft metadata." }
            gh release upload $tag --repo $repo @files --clobber
          } else {
            gh release create $tag --repo $repo --verify-tag --draft --title "YANKENT POS $env:VERSION" --notes-file 'release/release-notes.md' @files
          }
          if ($LASTEXITCODE -ne 0) { throw "Draft release upload failed." }

          $release = gh release view $tag --repo $repo --json isDraft,isPrerelease,assets | ConvertFrom-Json
          if ($release.isPrerelease) { throw "Draft $tag became a prerelease; refusing stable promotion." }
          if (-not $release.isDraft) { throw "Release was published before verification." }
          $expected = @($files | ForEach-Object { Split-Path -Leaf $_ } | Sort-Object)
          $actual = @($release.assets | ForEach-Object name | Sort-Object)
          if (Compare-Object $expected $actual) { throw "Draft assets do not exactly match the verified files." }

  publish:
    name: Publish verified release
    needs: [build, draft]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download immutable verified artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-release-${{ needs.build.outputs.version }}
          path: verified

      - name: Promote draft and verify Latest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $tag = $env:RELEASE_TAG
          $repo = $env:GITHUB_REPOSITORY
          $releaseJson = gh release view $tag --repo $repo --json isDraft,isPrerelease,assets
          if ($LASTEXITCODE -ne 0) { throw "Could not inspect draft release $tag." }
          $release = $releaseJson | ConvertFrom-Json
          if ($release.isPrerelease) { throw "$tag is a prerelease; refusing stable promotion." }
          if (-not $release.isDraft) { throw "$tag is not a draft; refusing to mutate it." }

          $expectedAssets = @(
            [pscustomobject]@{
              Name = "YANKENT-POS-Setup-$env:VERSION.exe"
              Source = "verified/dist/YANKENT-POS-Setup-$env:VERSION.exe"
            },
            [pscustomobject]@{
              Name = "YANKENT-POS-Setup-$env:VERSION.exe.blockmap"
              Source = "verified/dist/YANKENT-POS-Setup-$env:VERSION.exe.blockmap"
            },
            [pscustomobject]@{ Name = 'latest.yml'; Source = 'verified/dist/latest.yml' },
            [pscustomobject]@{ Name = 'SHA256SUMS.txt'; Source = 'verified/dist/SHA256SUMS.txt' }
          )
          foreach ($asset in $expectedAssets) {
            if (-not (Test-Path -LiteralPath $asset.Source)) {
              throw "Immutable Actions artifact is missing $($asset.Source)."
            }
          }

          $expected = @($expectedAssets | ForEach-Object Name | Sort-Object)
          $actual = @($release.assets | ForEach-Object name | Sort-Object)
          if (Compare-Object $expected $actual) { throw "Final asset verification failed." }

          $downloadDirectory = 'draft-assets'
          New-Item -ItemType Directory -Path $downloadDirectory -ErrorAction Stop | Out-Null
          gh release download $tag --repo $repo --dir $downloadDirectory --clobber
          if ($LASTEXITCODE -ne 0) { throw "Could not download draft release assets for verification." }

          $downloaded = @(Get-ChildItem -LiteralPath $downloadDirectory -File | ForEach-Object Name | Sort-Object)
          if (Compare-Object $expected $downloaded) {
            throw "Downloaded draft assets do not exactly match the immutable artifact."
          }
          foreach ($asset in $expectedAssets) {
            $downloadedPath = Join-Path $downloadDirectory $asset.Name
            $verifiedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset.Source).Hash
            $draftHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $downloadedPath).Hash
            if ($verifiedHash -ne $draftHash) {
              throw "SHA-256 mismatch for draft asset $($asset.Name)."
            }
          }

          $releaseJson = gh release view $tag --repo $repo --json isDraft,isPrerelease,assets
          if ($LASTEXITCODE -ne 0) { throw "Could not re-check draft release $tag." }
          $release = $releaseJson | ConvertFrom-Json
          if ($release.isPrerelease) { throw "$tag became a prerelease; refusing stable promotion." }
          if (-not $release.isDraft) { throw "$tag is no longer a draft; refusing to mutate it." }
          $actual = @($release.assets | ForEach-Object name | Sort-Object)
          if (Compare-Object $expected $actual) { throw "Draft assets changed during verification." }

          $pagesJson = gh api --paginate --slurp "repos/$repo/releases?per_page=100"
          if ($LASTEXITCODE -ne 0) { throw "Could not inspect all published GitHub releases." }
          $pages = ConvertFrom-Json -InputObject $pagesJson -NoEnumerate
          $publishedVersions = @(
            foreach ($page in $pages) {
              foreach ($candidate in $page) {
                if (-not $candidate.draft -and -not $candidate.prerelease -and $candidate.tag_name -match '^v\d+\.\d+\.\d+$') {
                  [version]$candidate.tag_name.Substring(1)
                }
              }
            }
          )
          if ($publishedVersions.Count -gt 0) {
            $highest = $publishedVersions | Sort-Object -Descending | Select-Object -First 1
            if ([version]$env:VERSION -le $highest) {
              throw "Version $env:VERSION must be higher than every published stable release; highest is $highest."
            }
          }

          gh release edit $tag --repo $repo --draft=false --latest
          if ($LASTEXITCODE -ne 0) { throw "Could not publish $tag." }
          $latest = (gh api "repos/$repo/releases/latest" --jq .tag_name).Trim()
          if ($latest -ne $tag) { throw "GitHub latest is $latest instead of $tag." }
